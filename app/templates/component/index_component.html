<div class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="card w-96 bg-base-100 shadow-xl">
    <div class="card-body gap-6">

      <h1 class="card-title text-2xl">Hello World</h1>

      <!-- Test Alpine: toggle teks (inline x-data, bukan dari app.js) -->
      <div x-data="{ pesan: 'Alpine.js aktif!', tampil: true }">
        <div class="alert alert-success mb-3" x-show="tampil">
          <span x-text="pesan"></span>
        </div>
        <button class="btn btn-primary btn-sm" @click="tampil = !tampil">
          Toggle Pesan
        </button>
      </div>

      <div class="divider"></div>

      <!-- Test counter — pakai Alpine.data('counter') dari app.js -->
      <!-- count akan persist (tersimpan di localStorage, tidak reset saat refresh) -->
      <div x-data="counter">
        <p class="text-lg font-semibold mb-3">
          Count: <span class="badge badge-neutral badge-lg" x-text="count"></span>
        </p>
        <div class="flex gap-2">
          <button class="btn btn-error btn-sm" @click="count--">Kurang</button>
          <button class="btn btn-success btn-sm" @click="count++">Tambah</button>
          <button class="btn btn-ghost btn-sm" @click="count = 0">Reset</button>
        </div>
        <p class="text-xs text-base-content/50 mt-2">
          * nilai tersimpan otomatis via $persist
        </p>
      </div>

      <div class="divider"></div>

      <!-- Test dropdown — pakai Alpine.data('dropdown') dari app.js -->
      <div x-data="dropdown" class="relative">
        <button class="btn btn-secondary btn-sm w-full" @click="toggle()">
          Dropdown
          <span x-text="open ? '▲' : '▼'"></span>
        </button>
        <div x-show="open"
             class="mt-2 w-full bg-base-100 border border-base-300 rounded-box shadow-md">
          <ul class="menu p-2">
            <li><a>Item 1</a></li>
            <li><a>Item 2</a></li>
            <li><a>Item 3</a></li>
          </ul>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Test modal — pakai Alpine.data('modal') dari app.js -->
      <div x-data="modal">
        <button class="btn btn-accent btn-sm w-full" @click="open()">
          Buka Modal
        </button>

        <!-- Overlay -->
        <div x-show="show"
             class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
          <div class="card w-80 bg-base-100 shadow-xl">
            <div class="card-body">
              <h2 class="card-title">Modal Test</h2>
              <p>Modal dari Alpine.data berhasil!</p>
              <div class="card-actions justify-end mt-2">
                <button class="btn btn-sm" @click="close()">Tutup</button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
