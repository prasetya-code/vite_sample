<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ Trusted Types compatibility policy -->
  <script nonce="{{ g.csp_nonce }}">
    if (window.trustedTypes && trustedTypes.createPolicy) {
      trustedTypes.createPolicy('default', {
        createHTML: (input) => input,
        createScript: (input) => input,
        createScriptURL: (input) => input
      });
    }
  </script>

  <!-- ✅ ANTI FLICKER CLOAK (INLINE, PALING AWAL) -->
  <style nonce="{{ g.csp_nonce }}">
    [x-cloak] {
      display: none !important;
    }
  </style>

  <!-- ✅ THEME BOOTSTRAP (SEBELUM FIRST PAINT) -->
  <script nonce="{{ g.csp_nonce }}">
    (function () {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored || (prefersDark ? 'dim' : 'bumblebee');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

  <!-- Favicon -->
  {% include 'base/favicon.html' %}

  <title>{% block title %}Prasetya Code{% endblock %}</title>
</head>

<body
  class="min-h-[100dvh]"
  x-data="{ theme: document.documentElement.dataset.theme }"
  x-cloak
  x-init="
    $nextTick(() => {
      document.body.removeAttribute('x-cloak')

      // 🔥 render Lucide SETELAH DOM & Alpine siap
      if (window.lucide_icons) {
        window.lucide_icons()
      }
    })
  "

  x-effect="
    // Persist & apply theme
    localStorage.theme = theme;
    document.documentElement.dataset.theme = theme;

    // 🔍 Debug log (jalan SETIAP theme berubah)
    console.log('Theme now:', theme);
  "
>

  {% block content %}{% endblock %}

  <!-- JS -->
  <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>

  <!-- CDN -->
  {% include 'base/cdn.html' %}

</body>
</html>
